200),rules:yn("1558980394-4c7c9299fe96",400,200),"before-ride":yn("1558980664-2cd663cf8dde",400,200),"ride-abilities":yn("1558981033-0f0309284409",400,200),"safe-practices":yn("1558981403-c5f9899a28bc",400,200),"crash-avoidance":yn("1558981359-219d6364c9c8",400,200),impaired:yn("1558981403-c5f9899a28bc",400,200),emergency:yn("1558981033-0f0309284409",400,200),practical:yn("1558980664-2cd663cf8dde",400,200),resources:yn("1558981033-0f0309284409",400,200)};function d2(i=""){if(typeof window>"u")return"";let e="";if(Vm.startsWith("https://"))e=Vm;else{const s=window.location.origin;if(window.location.protocol==="https:")e=s;else{const c=window.location.port||"5173",d=window.location.hostname,m=d==="localhost"||d==="127.0.0.1"?"":d;if(!m)return"";e=`http://${m}:${c}`}}if(!i)return e;const n=i.startsWith("/")?i:`/${i}`;return`${e.replace(/\/$/,"")}${n}`}function Zc(i,e,n,s){return{showWelcome:i,tab:e,chapterIdx:n,inQuiz:s}}function eh(i){if(!i||typeof i!="object")return null;const e=typeof i.tab=="string"?i.tab:"home",n=Number.isInteger(i.chapterIdx)?i.chapterIdx:null;return{showWelcome:!!i.showWelcome,tab:e,chapterIdx:n,inQuiz:!!i.inQuiz}}function f2(i,e){return(i==null?void 0:i.showWelcome)===(e==null?void 0:e.showWelcome)&&(i==null?void 0:i.tab)===(e==null?void 0:e.tab)&&(i==null?void 0:i.chapterIdx)===(e==null?void 0:e.chapterIdx)&&(i==null?void 0:i.inQuiz)===(e==null?void 0:e.inQuiz)}const Mm=[{id:"welcome",title:"Welcome",icon:"BookOpen",color:"#7F8C95",sections:[{title:"Cayman Custom Cycles Motorcycle Handbook",content:`Welcome to your interactive Motorcycle Rider's Handbook, brought to you by **Cayman Custom Cycles** in partnership with the Cayman Islands Motorcycle Riders Association (CIMRA).

The Cayman Islands offer a climate and weather favorable to motorcycle riders all year. For the safety of the motorcycle operator and those sharing the road with them, training and proper licensing is required by law.

This handbook contains valuable information on techniques to operate a motorcycle safely. Strategies and techniques on managing the riding environment and avoiding crashes are presented along with an introduction to pertinent laws and the Rules of the Road.

**Crash studies show that rider course graduates have far lower injury and fatality rates compared to untrained riders, clearly indicating the value of rider education.**

Alcohol is a significant factor contributing to motorcycle related crashes — 42% of motorcycle riders who died in single-vehicle crashes had BAC levels of .08 or higher. Balance, coordination, vision, judgment — all essential skills needed for safe motorcycle operation can be negatively impacted by consumption of as little as one drink.`},{title:"About CIMRA",content:`The Cayman Islands Motorcycle Riding Association was organized on November 10, 2000. We are a positive, friendly group of riders — males and females, ages range from the early 20's and up, from all walks of life. We ride a variety of motorcycles including cruisers, touring, sport bikes and scooters.

**Mission:** To create an Association where motorcyclists can enjoy the sport through shared activities and camaraderie. To promote motorcycle safety, project a positive image of motorcycling, promote motorcycling through community involvement and raise the general public's awareness of the sport.

Find CIMRA at: facebook.com/CIMRA`}]},{id:"licensing",title:"Licensing & Registration",icon:"FileText",color:"#8D806E",sections:[{title:"Definitions",content:`**Motor Vehicle:** Any self-propelled vehicle intended for operation upon public right of way, excluding vehicles moved solely by human power, motorized wheelchairs, and motorized bicycles.

**Motorcycle:** A motor vehicle powered by a motor with a displacement of more than 125 cubic centimeters, having a seat or saddle for the rider, designed to travel on not more than two wheels in contact with the ground.

**Motor Scooter:** A motorcycle powered by a motor with a displacement of 125 cubic centimeters or less.`},{title:"Operator Licensing",content:`You must be at least **17 years old** to ride a motorcycle having an engine capacity not exceeding 125cc.

**Learner License:** You MUST display 'L' plates whilst riding.

**License Groups:**
• **Group 0** — Mopeds
• **Group 1** — Motorcycles (including mopeds and motor scooters) up to 125cc
• **Group 1A** — Motorcycles in excess of 125cc
• **Group 2** — Motor cars
• **Group 3** — Trucks
• **Group 4** — Special vehicles

**To qualify for Group 1A, you must meet one of these criteria:**
• Hold a full Group 1 license AND complete a basic rider safety course approved by the Director
• Hold a full Group 1 license for at least one year
• Have a full car/truck/special vehicle license — you'll take a practical motorcycle test for Group 1 only
• Provide documentation of a motorcycle operator's license from another recognized jurisdiction`},{title:"Motor Vehicle Registration",content:"The owner or person in charge of a motor vehicle operated on the public right of way shall register the vehicle in their name. All motorcycles MUST have insurance. Check with your insurance company about your coverage before you buy or ride a motorcycle."}],quiz:[{q:"What is the minimum age to ride a motorcycle up to 125cc?",options:["16 years old","17 years old","18 years old","21 years old"],correct:1,explanation:"You must be at least 17 years old to ride a motorcycle with an engine capacity not exceeding 125cc."},{q:"What must a learner license holder display while riding?",options:["'S' plates","'L' plates","'P' plates","No plates required"],correct:1,explanation:"Learner license holders MUST display 'L' plates whilst riding."},{q:"Which license group covers motorcycles over 125cc?",options:["Group 0","Group 1","Group 1A","Group 2"],correct:2,explanation:"Group 1A covers motorcycles in excess of 125cc."},{q:"What is a motorcycle by Cayman Islands law?",options:["Any two-wheeled vehicle","Motor with displacement over 125cc on two wheels","Any two-wheeled motorized vehicle","A vehicle with a seat and motor"],correct:2,explanation:'The Traffic Act (2026 Revision), section 2, defines a motorcycle as "a vehicle, but not an invalid carriage, with three wheels or less, which is used for the transportation of people, and includes a motor scooter and moped, but does not include an all-terrain cycle."'}]},{id:"rules",title:"Rules of the Road",icon:"Shield",color:"#83554E",sections:[{title:"General Road Code",content:`In the Cayman Islands, any person operating a motorcycle is subject to the same regulations as any other motor vehicle driver. Drivers from all corners of the world live here where traffic laws can differ — always be alert.

**Key Rules:**
• Minimum age **17** to operate any motor vehicle
• **Drive on the LEFT** side of the road (except one-way streets or overtaking)
• Before making a right-hand turn, give right of way to all vehicles
• Comply with all traffic signals and signs
• Drive at a speed where you can stop in an emergency without collision
• Keep watch on the road behind AND in front
• Give prior warning of any intended maneuver (hand or indicator signals)
• **Turning left on a red light is allowed** after a full stop
• Four-way stops: whoever arrives first, proceeds first
• The center turning lane is for right turns only — NEVER for overtaking`},{title:"School Zones & Special Rules",content:`• When a school bus has lights flashing, you must NOT pass it (from front or rear)
• **15 mph speed limit** in dedicated school zones when warning lights are flashing
• You must NOT use a hand-held mobile phone while driving (except calling 911 in genuine emergency)
• You must exercise proper control of your vehicle at all times`},{title:"Roundabouts",content:`Roundabouts are frequent in Cayman. The rules are simple:

• Always travel **clockwise** around a roundabout — NEVER turn right into one!
• All traffic approaching MUST **yield to traffic already in the roundabout**
• Use your indicators when approaching or exiting
• Observe movement of other cars — don't just rely on mirrors
• Keep in formation on multi-lane roundabouts — don't change lanes
• Cars in the right-hand lane have right of way
• If you can't safely exit, **go around again** rather than force your way out
• Once on a roundabout, do NOT stop to admit cars entering from the left`},{title:"Motorcycle-Specific Road Code",content:`• All motorcycles are entitled to **full use of a lane** — no car may deprive a motorcycle of its lane
• Rider AND passenger must wear an **approved crash helmet** (DOT or ECE standards), securely fastened
• A learner license holder may carry a pillion passenger if the passenger is fully licensed
• Full license holders may carry **no more than one passenger**, seated facing forward on foot rests
• A passenger should only be carried if the motorcycle is designed/manufactured for it
• Motorcycles may ride **two abreast** in a single lane but NOT more than two
• You shall NOT overtake and pass in the same lane as the vehicle being overtaken
• No person shall operate between lanes of traffic or between rows of vehicles
• **Keep both wheels on the ground at all times**`},{title:"Helmet & Equipment Requirements",content:`• Everyone MUST wear an approved motorcycle helmet (DOT or ECE)
• You should always wear eye protection: goggles, face shields, or eyeglasses
• Tinted devices shall not be used at night
• No headsets, headphones or listening devices that interfere with hearing
• Passenger motorcycles must have footrests and handholds
• Handlebars/handgrips must not be higher than the rider's shoulders
• Required lights: headlight, red rear light, red reflector, brake light, registration plate light, amber turn signals (front & rear)
• No red lights at the front; no white lights (other than reverse or plate light) at the rear`}],quiz:[{q:"Which side of the road do you drive on in the Cayman Islands?",options:["Right side","Left side","Either side","Center"],correct:1,explanation:"In Cayman, you must keep to the LEFT side of the road."},{q:"What direction should you travel around a roundabout?",options:["Counter-clockwise","Clockwise","Either direction","Straight through"],correct:1,explanation:"Always travel clockwise around a roundabout. Never turn right into one!"},{q:"Can a learner license holder carry a pillion passenger?",options:["Yes, with a fully licenced passenger","Yes, always","No, never","Only on highways"],correct:0,explanation:"A learner license holder may carry a pillion passenger if that passenger is fully licenced."},{q:"How many motorcycles may ride abreast in a single lane?",options:["One only","Two maximum","Three maximum","No limit"],correct:1,explanation:"Motorcycles may operate two abreast in a single lane, but not more than two."},{q:"When is turning left on a red light allowed?",options:["Never","After a full stop","Only with a green arrow","At any time"],correct:1,explanation:"Turning left on a red light is allowed after coming to a full stop."},{q:"What is the speed limit in school zones?",options:["10 mph","15 mph","20 mph","25 mph"],correct:1,explanation:"15 mph speed limits have been set in dedicated school zones."},{q:"Are contact lenses acceptable as eye protection?",options:["Yes","No","Only with a windshield","Only during the day"],correct:1,explanation:"Contact lenses are NOT acceptable eye protection for motorcycle riders."},{q:"Who has right of way at a roundabout?",options:["Traffic entering","Traffic already in the roundabout","The largest vehicle","Traffic on the left"],correct:1,explanation:"All traffic approaching a roundabout must yield to traffic already in it."}]},{id:"before-ride",title:"Before You Ride",icon:"Settings",color:"#A47A42",sections:[{title:"Preparation Checklist",content:`Your preparation before a trip determines whether you'll get there safely. Before taking off, always:

• Wear the right protective and safety gear
• Become familiar with the motorcycle controls and equipment
• Check the mechanical condition of the motorcycle
• Ride responsibly — if you are feeling ill, dizzy, or weak, find an alternative`},{title:"Helmets & Helmet Use",content:`**One out of every five motorcycle crashes results in head or neck injuries.** Head and neck injuries account for a majority of serious and fatal injuries to motorcyclists.

**Facts to consider:**
• An approved helmet lets you see as far to the sides as necessary
• Most crashes happen on **short trips** (less than 5 miles), just minutes after starting
• Most riders are riding **slower than 30 mph** when a crash occurs — helmets cut head injuries by half at these speeds
• Helmeted riders are **3x more likely to survive** head injuries

**Your helmet must:**
• Meet DOT or ECE standards (Snell Memorial Foundation label is a plus)
• Fit snugly all the way around
• Have no cracks, loose padding, or frayed straps
• Be securely fastened when riding`},{title:"Pre-Ride Motorcycle Check",content:`**Before EVERY ride check:**
• **Tires** — air pressure, tread wear, damage, embedded objects
• **Wheels** — damage, bearing condition, spokes
• **Headlights & Tail-light** — both high and low beams working
• **Turn Signals** — all working properly
• **Brake Light** — both brake controls activate it
• **Brakes** — front and rear feel firm, hold the motorcycle
• **Clutch, Choke & Throttle** — work smoothly, throttle snaps back
• **Mirrors** — clean, adjusted, secure mount
• **Horn** — works properly
• **Fuel supply valve** — turned on before riding`},{title:"Clothing",content:`**Jacket & Pants:** Cover arms and legs completely. Modern ballistic synthetic mesh jackets provide slide protection AND impact-resistant armor for elbows and spine. Wear a jacket even in warm weather to prevent dehydration.

**Boots/Shoes:** High and sturdy enough to cover ankles. Hard, durable, slip-resistant soles. Short heels. Tuck laces so they won't catch.

**Gloves:** Allow a better grip and protect hands. Leather or durable material, snug fit without extra material interfering with controls.

**Cold/Wet Weather:** Clothes should keep you warm and dry. Good rain suits designed for motorcycle riding resist tearing and ballooning.`}],quiz:[{q:"How often do most motorcycle crashes happen on short trips?",options:["Rarely","Most crashes happen on short trips under 5 miles","Only on highways","Only at night"],correct:1,explanation:"Most crashes happen on short trips (less than 5 miles), just a few minutes after starting out."},{q:"How much more likely are helmeted riders to survive head injuries?",options:["Twice as likely","Three times more likely","Five times more likely","The same"],correct:1,explanation:"Helmeted riders are three times more likely to survive head injuries."},{q:"What should you check before EVERY ride?",options:["Only the fuel level","Only the tires","Tires, lights, brakes, throttle, mirrors, horn","Nothing if the bike ran yesterday"],correct:2,explanation:"You should check tires, lights, brakes, clutch/throttle, mirrors, horn, and fuel before every ride."},{q:"What should your motorcycle throttle do when you let go?",options:["Stay in position","Snap back (close)","Open fully","Nothing"],correct:1,explanation:"The throttle should snap back when you let go. This is a critical safety check."},{q:"More than half of all crashes occur on motorcycles ridden by the operator for less than how long?",options:["One month","Six months","One year","Two years"],correct:1,explanation:"More than half of all crashes occur on motorcycles ridden by the operator for less than six months."}]},{id:"ride-abilities",title:"Ride Within Your Abilities",icon:"Gauge",color:"#66735F",sections:[{title:"Body Position",content:`To control a motorcycle well:

**Posture:** Sit so you use your arms to steer, not hold yourself up.
**Seat:** Sit far enough forward so arms are slightly bent when holding handle-grips.
**Hands:** Hold grips firmly. Start with right wrist flat to avoid accidental throttle.
**Knees:** Keep against the gas tank to help balance in turns.
**Feet:** Keep firmly on foot-pegs at all times (except when stopped). Don't drag feet.`},{title:"Braking",content:`Your motorcycle has two brakes — front and rear. **Use both at the same time.**

• The **front brake is more powerful** — provides at least 75% of stopping power
• The front brake is safe when used properly
• **Squeeze** the front brake lever — never grab
• Press down on the rear brake

**In a turn:** If possible, straighten the bike upright first, then brake. Avoid using the front brake while in a turn position. If you must brake while leaning, apply brakes lightly and reduce throttle.`},{title:"Turning",content:`Riders often try to take curves too fast, ending up in another lane or overreacting and braking too hard.

**Approach turns with caution — SLOW, LOOK, PRESS:**
• **SLOW** — Reduce speed before the turn
• **LOOK** — Look through the turn to where you want to go. Turn your head, not shoulders.
• **PRESS** — To lean the motorcycle, press on the handle-grip in the direction of the turn. Press left = lean left = go left.`},{title:"Following Distance & Lane Positions",content:`**Maintain a minimum of 6 seconds** behind the vehicle ahead.

**To gauge following distance:**
1. Pick a marker on or near the road ahead
      2. When the vehicle ahead passes it, count: "one-thousand-one" through "one-thousand-six"
      3. If you reach the marker before "six," you're too close

      **Increase to 10 seconds when:**
• Pavement is slippery
• You can't see through the vehicle ahead
• Traffic is heavy

**Lane position should:**
• Increase your ability to see and be seen
• Avoid others' blind spots
• Avoid surface hazards
• Protect your lane from other drivers`},{title:"Passengers & Group Riding",content:`**Only experienced riders should carry passengers.** Practice away from traffic first.

**Instruct your passenger to:**
• Get on only after the engine is started
• Sit as far forward as possible without crowding you
• Hold firmly to your waist or belt
• Keep both feet on pegs even when stopped
• Stay directly behind you — avoid unnecessary movement

**Group Riding — Staggered Formation:**
Leader rides in the right side of the lane. Second rider stays 2 seconds behind in the left side. This keeps the group close with safe distances. Pass one at a time. Single-file for curves, turning, and entering/leaving a highway.`}],quiz:[{q:"What is the minimum safe following distance?",options:["2 seconds","4 seconds","6 seconds","10 seconds"],correct:2,explanation:"Normally, a minimum of six seconds distance should be maintained behind the vehicle ahead."},{q:"How much of your total stopping power does the front brake provide?",options:["About 25%","About 50%","At least 75%","100%"],correct:2,explanation:"The front brake provides at least three-quarters (75%) of your total stopping power."},{q:"What does 'Press left' do to the motorcycle?",options:["Turns right","Goes straight","Leans left / goes left","Stops"],correct:2,explanation:"Press left = lean left = go left. This is called countersteering."},{q:"What formation is best for group riding on straight roads?",options:["Side by side","Staggered formation","Single file","Random"],correct:1,explanation:"Staggered formation is the best way to keep ranks close yet maintain adequate space cushion."}]},{id:"safe-practices",title:"Safe Riding Practices",icon:"Eye",color:"#6F7D85",sections:[{title:"S.E.E. — Search, Evaluate, Execute",content:`Good experienced riders use **S.E.E.** — a three-step process for making appropriate judgments in traffic:

**SEARCH** — Aggressively scan ahead, to the sides, and behind. Focus on finding potential escape routes, especially at intersections, shopping areas, school and construction zones.

**EVALUATE** — Think about how hazards can interact to create risk. Anticipate problems and plan to reduce risk.

**EXECUTE** — Carry out your decision:
• Communicate your presence with lights and/or horn
• Adjust speed by accelerating, stopping, or slowing
• Adjust position and/or direction
• Handle two or more hazards one at a time — adjust speed to let them separate`},{title:"Increasing Visibility",content:`In crashes with motorcyclists, drivers often say they **never saw the motorcycle.**

**Clothing:** Wear bright-colored clothing — orange, red, yellow, or green jackets/vests are best.

**Headlight:** Keep the headlight on at ALL times. A motorcycle with its light on is **twice as likely to be noticed.** Use high beam during the day.

**Signals:** Use them anytime you change lanes or turn — even when you think no one is around.

**Brake Light:** Flash your brake light before slowing, especially when being followed closely.

**Horn:** Give a quick beep before passing anyone who may move into your lane.`},{title:"Riding at Night",content:`At night, it's harder to see and be seen.

• **Reduce speed** — ride slower than daytime, especially on unfamiliar roads
• **Increase distance** — open up 5+ second following distance
• **Use the car ahead** — their headlights show the road better than your high beam
• **Use your high beam** whenever not following or meeting a car
• **Be flexible about lane position** — choose whatever portion helps you see, be seen, and maintain a space cushion`}],quiz:[{q:"What does S.E.E. stand for?",options:["Speed, Energy, Escape","Search, Evaluate, Execute","Slow, Examine, Exit","Steer, Ease, Engage"],correct:1,explanation:"S.E.E. stands for Search, Evaluate, Execute — a three-step process for safe riding decisions."},{q:"How much more likely is a motorcycle with its headlight on to be noticed?",options:["50% more likely","Twice as likely","Three times more likely","No difference"],correct:1,explanation:"During the day, a motorcycle with its light on is twice as likely to be noticed."},{q:"Are mirrors sufficient before changing lanes?",options:["Yes, always","No — you must also do a head check","Only on highways","Only at night"],correct:1,explanation:"Mirrors are not enough. Before changing lanes, turn your head and look to the side for vehicles in your blind spots."}]},{id:"crash-avoidance",title:"Crash Avoidance",icon:"AlertTriangle",color:"#A1594A",sections:[{title:"Quick Stops",content:`To stop quickly, use **both brakes** simultaneously:
• **Squeeze** the front brake lever — NEVER grab
• **Press** down on the rear brake
• Keep the motorcycle straight and upright when possible

If braking while leaning in a curve: apply brakes lightly, reduce throttle. As you slow, reduce lean angle and increase brake pressure until straight.`},{title:"Swerving",content:`Sometimes you can't stop in time — you may need to swerve (a sudden change in direction).

**To swerve:**
• Apply hand pressure to the handle grip on the side of your escape direction
• Keep your body upright — let the motorcycle lean underneath you
• Make your escape route the target of your vision

**CRITICAL:** Brake before or after swerving — **NEVER while swerving.** Separating braking from swerving is essential.`},{title:"Dangerous Surfaces",content:`**Slippery Surfaces (wet pavement, gravel, lane markings, manhole covers):**
• Reduce speed before the slippery surface
• Avoid sudden moves — be smooth with speed, shifting, turning, braking
• Use both brakes (squeeze front gently)
• Ride in tire tracks left by cars when wet

**Obstacles:**
• Approach at 90° angle, slow down, keep motorcycle straight
• Rise slightly off seat, roll on throttle slightly just before contact to lighten front end

**Grooves & Gratings:** Relax, maintain steady speed, ride straight across.`},{title:"Mechanical Problems",content:`**Tire Failure:**
• Front flat: steering feels "heavy" — very hazardous
• Rear flat: back end jerks or sways side to side
• Either tire: hold grips firmly, ease off throttle, keep straight

**Stuck Throttle:**
1. Twist throttle back and forth several times
2. If still stuck: operate engine cut-off switch AND pull in clutch simultaneously
3. Pull off and stop

**Wobble (front wheel shakes):**
• Grip handlebars firmly but don't fight the wobble
• Close throttle gradually — do NOT apply brakes
• Move weight forward and down`}],quiz:[{q:"When swerving to avoid an obstacle, should you brake at the same time?",options:["Yes, always","Only the front brake","No — brake before or after, never while swerving","Only the rear brake"],correct:2,explanation:"Brake before or after swerving — NEVER while swerving. This is critical for maintaining control."},{q:"What is the best approach angle for going over an obstacle?",options:["45 degrees","As close to 90 degrees as possible","Parallel","Any angle"],correct:1,explanation:"Approach obstacles at as close to a 90° angle as possible to maintain control."},{q:"What should you do if your throttle gets stuck?",options:["Pull in the clutch only","Twist it back and forth, then use engine cut-off switch AND clutch","Jump off the motorcycle","Apply only the rear brake"],correct:1,explanation:"First twist back and forth. If still stuck, simultaneously use the engine cut-off switch AND pull in the clutch."},{q:"If your front tire goes flat while riding, what will you feel?",options:["The back will sway","Steering feels 'heavy'","Nothing noticeable","The engine will stall"],correct:1,explanation:"If the front tire goes flat, the steering will feel 'heavy' — this is particularly hazardous."}]},{id:"impaired",title:"Riding Impaired",icon:"AlertTriangle",color:"#7B4D46",sections:[{title:"Alcohol & Drugs",content:`Alcohol impairs balance, coordination, vision, and judgment — ALL essential for safe motorcycle operation — with as little as **one drink.**

**Blood Alcohol Concentration (BAC):**
• Your body eliminates approximately one drink per hour
• A smaller person accumulates higher BAC from the same amount
• Impairment of judgment and skills begins well below the legal limit

**Alcohol and the Law in Grand Cayman:**
• A BAC at or above **0.100** is presumed legally intoxicated
• Regardless of BAC, if found driving unsafely you can be charged

**Consequences of Conviction:**
• **First offence:** Fine up to $1,000 OR imprisonment up to 6 months, or both
• **Second/subsequent offence:** Fine of $2,000 AND imprisonment for 12 months, or both
• **Disqualification:** 12 months or longer as the court orders`},{title:"Fatigue & Emotions",content:`**Fatigue:** Riding a motorcycle is more tiring than driving a car.
• Protect yourself from wind, cold, and rain
• Limit distance — experienced riders seldom ride more than 6 hours a day
• Take rest breaks at least every 2 hours
• Don't use artificial stimulants — they lead to extreme fatigue when wearing off

**Emotions:** Anger, stress, depression, aggression, or euphoria can be dangerous distractions. Caution and prudence are much more under your control than luck.`}],quiz:[{q:"How many drinks can impair motorcycle riding ability?",options:["Three or more","Two","As little as one","Five or more"],correct:2,explanation:"Balance, coordination, vision, and judgment can be negatively impacted by as little as one drink."},{q:"What is the presumed legal BAC limit in Grand Cayman?",options:["0.050","0.080","0.100","0.120"],correct:2,explanation:"In Grand Cayman, a BAC at or above 0.100 is presumed legally intoxicated."},{q:"What is the penalty for a first DUI offence?",options:["Warning only","Up to $1,000 fine or 6 months imprisonment, or both","$500 fine","License suspension only"],correct:1,explanation:"First offence: fine up to $1,000 OR imprisonment up to 6 months, or both."},{q:"How often should you take rest breaks on a long ride?",options:["Every 4 hours","Every 2 hours","Every hour","Only when tired"],correct:1,explanation:"Stop and get off the motorcycle at least every two hours."}]},{id:"emergency",title:"When Bad Things Happen",icon:"Heart",color:"#8B5D55",sections:[{title:"At a Crash Scene",content:`**Secure the Scene:**
• Assess for potential dangers to bystanders, approaching traffic, and those involved
• Mark the site to direct traffic safely around the area
• Identify those involved

**First Aid (ABCs):**
• **Airway** — manage the airway, assure it is open and unobstructed
• **Breathing** — look, listen, and feel for breathing
• **Circulation** — check for a pulse, look for severe bleeding
• **Stabilize** — do NOT move someone with an injury unless they're in imminent danger
• **Helmet removal** — do NOT remove a helmet unless it is life-threatening, such as when the rider is not breathing

**A course in CPR and basic first aid is invaluable.**`},{title:"Insurance & Evading Officers",content:`**Insurance:** All motorcycles MUST have insurance. Check your coverage before you ride.

**Evading a Peace Officer:** Failure to follow their direction or attempting to evade can place you, the officers, and everyone around you in serious jeopardy. This could result in serious prison sentence, heavy fine, or both.`}],quiz:[{q:"What are the ABCs of first aid?",options:["Alert, Bandage, Call","Airway, Breathing, Circulation","Assess, Block, Control","Aid, Balance, Comfort"],correct:1,explanation:"The ABCs: Airway (open/unobstructed), Breathing (look/listen/feel), Circulation (pulse/bleeding check)."},{q:"Should you move an injured person at a crash scene?",options:["Yes, always","Only to a comfortable position","No, unless they're in imminent danger","Only if they ask"],correct:2,explanation:"Do NOT move someone with an injury unless their position places them in imminent danger."}]},{id:"practical",title:"Practical Skills & Testing",icon:"Target",color:"#6B705D",sections:[{title:"Riding Exercises",content:`**Key principles for all exercises:**
• The course is only cones, paint, and chalk — it's better to go outside a line than drop the bike
• Keep your front wheel on course — the back wheel follows
• Keep head up, eyes focused on WHERE YOU'RE GOING, not where you are
• Do NOT look at lane lines — you'll drive ON them instead of between them
• Use clutch to control speed; go easy on the throttle
• You can drag the rear brake for balance and speed control
• Lean the bike while staying mostly vertical in tight, slow turns
• Keep feet on the pegs — do NOT put your foot down while riding`},{title:"The Written Test",content:`The written final test consists of multiple-choice questions similar in content to study questions throughout this handbook. Review all chapter study questions with special attention to material you found challenging.

**Remember:** A passing score doesn't mean you know everything. The question you can't answer might make the difference between life or death.`},{title:"The Riding Test",content:`**Required:** Proper helmet, eye protection, clothing and footwear.

**The test includes:**
• Weaving through cones
• Riding the large circle (clockwise, twice around)
• Large circle counter-clockwise (twice around)
• Gear shift ride (straight path, shift up then down, U-turn, return, smooth stop)

**Tips for success:**
• Keep front wheel between the lanes
• Do NOT put your foot down during exercises
• Use clutch for speed control, very little throttle
• Drag rear brake for balance`}],quiz:[{q:"Where should you look when riding through a practice course?",options:["At the lane lines","At your front wheel","Where you're going — ahead of your current position","At the ground"],correct:2,explanation:"Keep your eyes focused on where you're going, not where you currently are. You go where you look!"},{q:"In slow tight turns, should you lean your body or the bike?",options:["Lean your body","Lean the bike while staying mostly vertical","Lean both equally","Stay perfectly upright"],correct:1,explanation:"In tight turns at slow speeds, it's usually easier to lean the bike while keeping your body mostly vertical."}]},{id:"resources",title:"Resources",icon:"MapPin",color:"#6B625A",sections:[{title:"Cayman Islands Government Agencies",content:`**Department of Vehicle & Drivers' Licensing**

Your local source for motorcycles, service, gear, and rider community in Grand Cayman.`}]}],fu={BookOpen:Qs,Shield:J0,AlertTriangle:tv,CheckCircle:bh,FileText:H0,Settings:X0,Eye:$0,Gauge:q0,Heart:W0,Target:Z0,MapPin:G0,Bike:F0};function eu(i){const e=[...i];for(let n=e.length-1;n>0;n-=1){const s=Math.floor(Math.random()*(n+1));[e[n],e[s]]=[e[s],e[n]]}return e}function Rh(i){if(!(i!=null&&i.options))return i;const e=eu(i.options.map((n,s)=>({option:n,index:s})));return{...i,options:e.map(n=>n.option),correct:e.findIndex(n=>n.index===i.correct)}}function pu({progress:i,size:e=56,stroke:n=5,color:s=D.emerald,label:a}){const c=(e-n)/2,d=2*Math.PI*c,g=d-i/100*d;return x.jsxs("svg",{width:e,height:e,style:{transform:"rotate(-90deg)",display:"block"},children:[x.jsx("circle",{cx:e/2,cy:e/2,r:c,fill:"none",stroke:D.border,strokeWidth:n}),x.jsx("circle",{cx:e/2,cy:e/2,r:c,fill:"none",stroke:s,strokeWidth:n,strokeDasharray:d,strokeDashoffset:g,strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.8s cubic-bezier(0.34,1.56,0.64,1)"}}),x.jsx("text",{x:e/2,y:e/2,textAnchor:"middle",dominantBaseline:"central",fill:s,fontSize:e*.24,fontWeight:"800",style:{transform:"rotate(90deg)",transformOrigin:"center"},children:a||`${Math.round(i)}%`})]})}function p2({text:i}){const e=i.split(`
